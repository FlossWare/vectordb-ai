name: Auto Release (X.Y Versioning)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  auto-version-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep -oP '__version__ = "\K[^"]+' python/vectordb_ai/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump minor version (X.Y)
        id: bump_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping from $CURRENT to $NEW_VERSION"

      - name: Update version in files
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          # Update __init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" python/vectordb_ai/__init__.py
          # Update setup.py
          sed -i "s/version=\".*\"/version=\"$NEW_VERSION\"/" python/setup.py
          echo "Updated to version $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python/vectordb_ai/__init__.py python/setup.py
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push

      - name: Create Git tag
        run: |
          git tag -a "v${{ steps.bump_version.outputs.new_version }}" -m "Release v${{ steps.bump_version.outputs.new_version }}"
          git push origin "v${{ steps.bump_version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          release_name: VectorDB AI v${{ steps.bump_version.outputs.new_version }}
          body: |
            ## VectorDB AI v${{ steps.bump_version.outputs.new_version }}

            **X.Y Versioning:** Every merge to main is a release candidate.

            ### What's New
            See commit history for changes since last release.

            ### Installation
            ```bash
            pip install git+https://github.com/FlossWare/vectordb-ai.git@v${{ steps.bump_version.outputs.new_version }}
            ```
          draft: false
          prerelease: false

      - name: Build Python package
        run: |
          cd python
          pip install build twine
          python -m build

      - name: Install FPM for native packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm
          sudo gem install --no-document fpm

      - name: Build RPM package
        run: |
          cd python
          VERSION="${{ steps.bump_version.outputs.new_version }}"
          fpm -s python -t rpm \
            --name python3-vectordb-ai \
            --version "$VERSION" \
            --python-bin python3 \
            --python-package-name-prefix python3 \
            --depends python3 \
            --description "Universal vector database adapter for AI applications" \
            --url "https://github.com/FlossWare/vectordb-ai" \
            --license "GPL-3.0" \
            --maintainer "FlossWare <noreply@flossware.org>" \
            --vendor FlossWare \
            setup.py
          mkdir -p dist-native
          mv *.rpm dist-native/

      - name: Build DEB package
        run: |
          cd python
          VERSION="${{ steps.bump_version.outputs.new_version }}"
          fpm -s python -t deb \
            --name python3-vectordb-ai \
            --version "$VERSION" \
            --python-bin python3 \
            --python-package-name-prefix python3 \
            --depends python3 \
            --description "Universal vector database adapter for AI applications" \
            --url "https://github.com/FlossWare/vectordb-ai" \
            --license "GPL-3.0" \
            --maintainer "FlossWare <noreply@flossware.org>" \
            --vendor FlossWare \
            setup.py
          mv *.deb dist-native/

      - name: Publish to PyPI
        if: secrets.PYPI_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd python
          python -m twine upload dist/* --skip-existing

      - name: Publish to packagecloud.io
        if: secrets.PACKAGECLOUD_TOKEN != ''
        run: |
          pip install packagecloud
          export PACKAGECLOUD_TOKEN=${{ secrets.PACKAGECLOUD_TOKEN }}

          # Publish Python packages
          cd python
          package_cloud push FlossWare/releases/python dist/*.whl
          package_cloud push FlossWare/releases/python dist/*.tar.gz

          # Publish RPM packages
          package_cloud push FlossWare/releases/el/8 dist-native/*.rpm
          package_cloud push FlossWare/releases/el/9 dist-native/*.rpm
          package_cloud push FlossWare/releases/fedora/39 dist-native/*.rpm
          package_cloud push FlossWare/releases/fedora/40 dist-native/*.rpm

          # Publish DEB packages
          package_cloud push FlossWare/releases/ubuntu/focal dist-native/*.deb
          package_cloud push FlossWare/releases/ubuntu/jammy dist-native/*.deb
          package_cloud push FlossWare/releases/ubuntu/noble dist-native/*.deb
          package_cloud push FlossWare/releases/debian/bullseye dist-native/*.deb
          package_cloud push FlossWare/releases/debian/bookworm dist-native/*.deb

      - name: Publish to GitHub Packages
        if: secrets.GITHUB_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://upload.pypi.org/legacy/
        run: |
          cd python
          # GitHub Packages uses same format as PyPI
          python -m twine upload --repository-url https://upload.pypi.org/legacy/ dist/* --skip-existing || true
