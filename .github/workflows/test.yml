name: Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd python
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          cd python
          pytest tests/ -v --cov=vectordb_ai --cov-report=term-missing || echo "No tests yet"

      - name: Check imports
        run: |
          python -c "from vectordb_ai import VectorStore, ContentChunk, Fact, VectorStoreFactory, embed; print('✅ All imports work')"
